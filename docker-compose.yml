version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Overclocked_DB_2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    restart: always

  overclocked-api:
    build:
      context: .
      dockerfile: Overclocked.API/Dockerfile
    ports:
      - "5256:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OverclockedDB;User Id=sa;Password=Overclocked_DB_2026!;TrustServerCertificate=True;
    depends_on:
      - sqlserver
    restart: on-failure

  products-api:
    build:
      context: .
      dockerfile: Overclocked.Products.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OverclockedProductsDB;User Id=sa;Password=Overclocked_DB_2026!;TrustServerCertificate=True;
    depends_on:
      - sqlserver
    restart: on-failure

  orders-api:
    build:
      context: .
      dockerfile: Overclocked.Orders.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - PRODUCTS_API_URL=http://products-api:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OverclockedOrdersDB;User Id=sa;Password=Overclocked_DB_2026!;TrustServerCertificate=True;
    depends_on:
      - sqlserver
    restart: on-failure

  frontend:
    build:
      context: ./Overclocked.Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - products-api
      - orders-api
    restart: on-failure